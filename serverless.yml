service: quickneeds-api

frameworkVersion: "3"

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  memorySize: 512
  timeout: 30
  environment:
    STAGE: ${self:provider.stage}
    DYNAMODB_TABLE: ${self:custom.tableName}
    JWT_SECRET: ${env:JWT_SECRET, 'your-secret-key-change-in-production'}
    SNS_REGION: ${self:provider.region}
    FIREBASE_SERVICE_ACCOUNT_KEY: ${env:FIREBASE_SERVICE_ACCOUNT_KEY, ''}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:BatchGetItem
            - dynamodb:BatchWriteItem
          Resource:
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:custom.tableName}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:custom.tableName}/index/*
        - Effect: Allow
          Action:
            - sns:Publish
          Resource: "*"

custom:
  tableName: quickneeds-${self:provider.stage}
  serverless-offline:
    httpPort: 3000

plugins:
  - serverless-plugin-typescript
  - serverless-offline

functions:
  # Auth Functions
  sendOtp:
    handler: src/handlers/auth.sendOtp
    events:
      - http:
          path: /auth/send-otp
          method: post
          cors: true

  verifyOtp:
    handler: src/handlers/auth.verifyOtp
    events:
      - http:
          path: /auth/verify-otp
          method: post
          cors: true

  # User Functions
  getProfile:
    handler: src/handlers/users.getProfile
    events:
      - http:
          path: /users/profile
          method: get
          cors: true
          authorizer:
            name: authorizerFunc
            resultTtlInSeconds: 300

  updateProfile:
    handler: src/handlers/users.updateProfile
    events:
      - http:
          path: /users/profile
          method: put
          cors: true
          authorizer:
            name: authorizerFunc
            resultTtlInSeconds: 300

  # Product Functions
  listProducts:
    handler: src/handlers/products.listProducts
    events:
      - http:
          path: /products
          method: get
          cors: true

  getProduct:
    handler: src/handlers/products.getProduct
    events:
      - http:
          path: /products/{id}
          method: get
          cors: true

  createProduct:
    handler: src/handlers/products.createProduct
    events:
      - http:
          path: /products
          method: post
          cors: true
          authorizer:
            name: authorizerFunc
            resultTtlInSeconds: 300

  updateProduct:
    handler: src/handlers/products.updateProduct
    events:
      - http:
          path: /products/{id}
          method: put
          cors: true
          authorizer:
            name: authorizerFunc
            resultTtlInSeconds: 300

  deleteProduct:
    handler: src/handlers/products.deleteProduct
    events:
      - http:
          path: /products/{id}
          method: delete
          cors: true
          authorizer:
            name: authorizerFunc
            resultTtlInSeconds: 300

  # Order Functions
  createOrder:
    handler: src/handlers/orders.createOrder
    events:
      - http:
          path: /orders
          method: post
          cors: true
          authorizer:
            name: authorizerFunc
            resultTtlInSeconds: 300

  listOrders:
    handler: src/handlers/orders.listOrders
    events:
      - http:
          path: /orders
          method: get
          cors: true
          authorizer:
            name: authorizerFunc
            resultTtlInSeconds: 300

  getOrder:
    handler: src/handlers/orders.getOrder
    events:
      - http:
          path: /orders/{id}
          method: get
          cors: true
          authorizer:
            name: authorizerFunc
            resultTtlInSeconds: 300

  updateOrderStatus:
    handler: src/handlers/orders.updateOrderStatus
    events:
      - http:
          path: /orders/{id}/status
          method: put
          cors: true
          authorizer:
            name: authorizerFunc
            resultTtlInSeconds: 300

  # Notification Functions
  registerToken:
    handler: src/handlers/notifications.registerToken
    events:
      - http:
          path: /notifications/register-token
          method: post
          cors: true
          authorizer:
            name: authorizerFunc
            resultTtlInSeconds: 300

  sendNotification:
    handler: src/handlers/notifications.sendNotification
    events:
      - http:
          path: /notifications/send
          method: post
          cors: true
          authorizer:
            name: authorizerFunc
            resultTtlInSeconds: 300

  # Authorizer
  authorizerFunc:
    handler: src/handlers/authorizer.handler

resources:
  Resources:
    QuickNeedsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.tableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: GSI1PK
            AttributeType: S
          - AttributeName: GSI1SK
            AttributeType: S
          - AttributeName: GSI2PK
            AttributeType: S
          - AttributeName: GSI2SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - AttributeName: GSI1PK
                KeyType: HASH
              - AttributeName: GSI1SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: GSI2
            KeySchema:
              - AttributeName: GSI2PK
                KeyType: HASH
              - AttributeName: GSI2SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        Tags:
          - Key: Environment
            Value: ${self:provider.stage}
          - Key: Service
            Value: quickneeds
